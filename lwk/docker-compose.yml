version: "3.9"

services:
  lwk-wallet:
    image: lwk-depix-wallet:latest
    ports:
      - "5000:5000"
    volumes:
      - lwk_wallet_data:/app/wallet_data
    environment:
      # ── Rede ──────────────────────────────────────────────────────
      NETWORK: ${NETWORK:-mainnet}
      ESPLORA_URL: ${ESPLORA_URL:-https://blockstream.info/liquid/api}

      # ── Asset ID do DePix (Liquid mainnet) ─────────────────────────
      # DePix "Decentralized Pix" — issuer depix.info, precision 8.
      DEPIX_ASSET_ID: ${DEPIX_ASSET_ID:-02f22f8d9c76ab41661a2729e4752e2c5d1a263012141b86ea98af5472df5189}

      # ── Seguranca ─────────────────────────────────────────────────
      # Chave forte obrigatoria em prod — protege TODOS os endpoints.
      API_KEY: ${API_KEY:?defina API_KEY no .env}

      # ── Webhook ───────────────────────────────────────────────────
      # URL que recebe os depositos detectados (pending + confirmed).
      # Use https — o secret/payload trafegam em claro em http.
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      # Segredo: enviado em X-Webhook-Secret + assina o corpo (HMAC-SHA256
      # em X-Signature) pro receptor validar integridade/origem.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Intervalo (s) entre verificacoes de novos depositos.
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-30}
      # Confirmacoes on-chain pra considerar deposito final.
      CONFIRMATIONS_REQUIRED: ${CONFIRMATIONS_REQUIRED:-2}

      # ── Hardening ──────────────────────────────────────────────────
      # CSV de origens permitidas no CORS (default: dashboard local).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000}
      # Teto do fee_rate (sat/vB) aceito no /transfer — evita fee absurda.
      FEE_RATE_MAX: ${FEE_RATE_MAX:-1.0}

      WALLET_DATA_DIR: /app/wallet_data
    networks:
      - wallet_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      # /health valida wallet + Esplora (responde 503 se degradado). Sem auth.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s

volumes:
  lwk_wallet_data:
    driver: local

networks:
  wallet_net:
    external: true
