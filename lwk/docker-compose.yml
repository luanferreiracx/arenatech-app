version: "3.9"

services:
  lwk-wallet:
    image: lwk-depix-wallet:latest
    ports:
      - "5000:5000"
    volumes:
      - lwk_wallet_data:/app/wallet_data
    environment:
      # ── Rede ──────────────────────────────────────────────────────
      NETWORK: ${NETWORK:-mainnet}
      ESPLORA_URL: ${ESPLORA_URL:-https://blockstream.info/liquid/api}

      # ── Asset ID do DePix (Liquid mainnet) ─────────────────────────
      # DePix "Decentralized Pix" — issuer depix.info, precision 8.
      DEPIX_ASSET_ID: ${DEPIX_ASSET_ID:-02f22f8d9c76ab41661a2729e4752e2c5d1a263012141b86ea98af5472df5189}

      # ── Seguranca ─────────────────────────────────────────────────
      # Chave forte obrigatoria em prod — protege TODOS os endpoints.
      API_KEY: ${API_KEY:?defina API_KEY no .env}

      # ── Webhook ───────────────────────────────────────────────────
      # URL que recebe os depositos detectados (pending + confirmed).
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      # Segredo enviado no header X-Webhook-Secret pro receptor validar.
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Intervalo (s) entre verificacoes de novos depositos.
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-30}
      # Confirmacoes on-chain pra considerar deposito final.
      CONFIRMATIONS_REQUIRED: ${CONFIRMATIONS_REQUIRED:-2}

      WALLET_DATA_DIR: /app/wallet_data
    networks:
      - wallet_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  lwk_wallet_data:
    driver: local

networks:
  wallet_net:
    external: true
