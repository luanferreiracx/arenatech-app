name: arenatech-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arenatech-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arenatech

  postgres:
    image: postgres:16-alpine
    container_name: arenatech-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenatech"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arenatech

  redis:
    image: redis:7-alpine
    container_name: arenatech-redis-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "6380:6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arenatech

  minio:
    image: minio/minio:latest
    container_name: arenatech-minio-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    networks:
      - arenatech

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:

networks:
  arenatech:
    driver: bridge
