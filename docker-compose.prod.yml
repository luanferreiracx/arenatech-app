name: arenatech-prod

services:
  app:
    # Imagem pre-buildada no GHA + publicada no GHCR.
    # CI/CD aplica override docker-compose.deploy.yml com image atualizado.
    # Build local ainda funciona via `docker compose build app`.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/luanferreiracx/arenatech-app:latest
    pull_policy: always
    container_name: arenatech-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arenatech

  postgres:
    image: postgres:16-alpine
    container_name: arenatech-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenatech"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arenatech

  redis:
    image: redis:7-alpine
    container_name: arenatech-redis-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arenatech

  minio:
    image: minio/minio:latest
    container_name: arenatech-minio-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    networks:
      - arenatech

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:

networks:
  arenatech:
    driver: bridge
    # IPv6 habilitado: a API CheckIMEI aceita IPv6 e rejeita IPv4 ("Wrong IP").
    # Sem isso, o container so tem egress IPv4 e a consulta de IMEI falha.
    # NAT66 (gateway_mode_ipv6=nat) mascara p/ o IPv6 global do host.
    enable_ipv6: true
    driver_opts:
      com.docker.network.bridge.gateway_mode_ipv6: nat
    ipam:
      config:
        - subnet: fd00:a2e:a7ec::/64
