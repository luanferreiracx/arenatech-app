name: CI/CD

on:
  # push SO na main: full E2E (pos-merge) + build + deploy. Branches de trabalho
  # NAO disparam no push — a validacao de uma branch acontece no PR (abaixo). Isso
  # evita RODAR O CI 2X por PR (push da branch + pull_request), que dobrava a fila
  # do runner self-hosted unico. O gate do merge continua sendo o @smoke do PR.
  push:
    branches: [main]
    # Mudancas SO de documentacao nao tem codigo a testar/buildar/deployar —
    # pulam o CI inteiro (verde na hora, sem esperar E2E ~7min).
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
  pull_request:
    branches: [main] # PR p/ main: roda so @smoke (full roda pos-merge na main)
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"

# Cancela runs antigos do mesmo contexto quando um novo chega (ex.: novo push na
# branch do PR). push na main NAO cancela (cada merge precisa buildar/deployar).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.0.8

jobs:
  # ============================================================
  # Setup compartilhado — instala deps + gera Prisma client.
  # Os 3 jobs (lint, typecheck, test) reaproveitam via cache.
  # ============================================================
  setup:
    name: Setup (deps + prisma)
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      pnpm-store: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache node_modules + prisma client
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  # ============================================================
  # Lint (paralelo) — com cache do ESLint
  # ============================================================
  lint:
    name: Lint
    needs: setup
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-

      - name: Lint
        run: pnpm eslint src --cache --cache-location .eslintcache --cache-strategy content

  # ============================================================
  # Typecheck (paralelo)
  # ============================================================
  typecheck:
    name: Typecheck
    needs: setup
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      # Regenera o client a partir do schema versionado. Sem isto, quando o
      # schema muda o cache restaura um client stale (e o pnpm install nao
      # regenera) -> typecheck quebra com "PrismaClient has no exported member".
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Typecheck
        run: pnpm typecheck

      # Trava de drift: a spec OpenAPI da API de parceiros é gerada dos schemas
      # Zod. Mexeu na API sem rodar `pnpm openapi:gen` -> build vermelho.
      - name: OpenAPI da API de parceiros em sincronia
        run: pnpm openapi:check

  # ============================================================
  # Unit tests (paralelo)
  # ============================================================
  test:
    name: Unit tests
    needs: setup
    runs-on: self-hosted
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6383:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      # Regenera o client (ver nota no job typecheck) — cache stale de schema
      # novo deixaria o client sem os tipos atualizados.
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Unit tests
        run: pnpm vitest run --exclude="**/integration/**"
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5435/arenatech_test
          REDIS_URL: redis://localhost:6383
          NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000

  # ============================================================
  # LWK (Python) — testes do servico de carteira: cripto da seed
  # non-custodial (ADR 0051) + roteamento custodial/non-custodial.
  # A lib `lwk` nativa e stubada nos testes (so cripto + flask).
  # ============================================================
  lwk-test:
    name: LWK Python tests
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LWK test deps
        run: pip install flask==3.1.0 flask-cors==5.0.0 requests==2.32.3 argon2-cffi==23.1.0 cryptography==44.0.0
      - name: Run LWK tests
        working-directory: lwk
        run: python -m unittest test_crypto test_app_noncustodial

  # ============================================================
  # Build Docker image + push para GHCR
  # Roda em paralelo com lint/typecheck/test (so depende de setup
  # implicitamente via cache hit). Para main, exige todos verdes.
  # ============================================================
  build-image:
    name: Build & push Docker image
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 12
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ============================================================
  # E2E — escopo adaptativo. OBJETIVO: ninguem espera o full.
  #   - push de BRANCH e PULL REQUEST p/ main: so @smoke (~25 testes, ~1min).
  #     Iteracao e merge rapidos.
  #   - push na MAIN (pos-merge): suite COMPLETA (~132), EM PARALELO ao deploy
  #     (deploy NAO tem needs: e2e => nao bloqueia; o full so AVISA se quebrar).
  # App roda via `next build && next start` (producao, sem Turbopack => sem
  # flakiness). Imagem Docker so e buildada no job de deploy (main).
  # ============================================================
  e2e:
    name: E2E
    needs: [lint, typecheck, test]
    runs-on: self-hosted
    # @smoke (branch/PR) termina em ~3-4min. O FULL (push na main, ~126 testes
    # serial — workers=1 por ADR 0039) leva ~25min (setup ~9min + testes ~16min).
    # Era 18min e a suite FULL era cancelada no meio toda run da main (sinal zero
    # desde que a suite cresceu). 35min dá folga p/ ela completar e voltar a AVISAR
    # (ADR 0045/0046 — full é advisory, roda em paralelo ao deploy e não bloqueia).
    timeout-minutes: 35
    env:
      DB_URL: postgresql://arenatech:testpass@localhost:5435/arenatech_e2e
      REDIS_URL: redis://localhost:6383
      NEXTAUTH_SECRET: e2e-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:4000
      SUPERADMIN_CPF: "12345678909"
      SUPERADMIN_PASSWORD: "Ar3naTech2026Super"
      CRON_SECRET: dev_cron_secret_not_for_production
      WHATSAPP_MOCK: "1"
      # Sem credenciais reais de Autentique no CI — roda em modo mock (getConfig
      # devolve null) mesmo com NODE_ENV=production do `next start`. Necessário
      # para fluxos que assinam digitalmente (ex.: revisão de orçamento da OS).
      AUTENTIQUE_MOCK: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_e2e
        ports: ["5435:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6383:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Definir escopo do E2E (smoke vs full)
        id: scope
        run: |
          # Objetivo: voce NUNCA espera o E2E full.
          #  - push de branch E PR p/ main => so @smoke (~1min): iteracao rapida.
          #  - push na MAIN (pos-merge) => suite completa, em paralelo ao deploy
          #    (deploy nao tem needs: e2e => nao bloqueia; full so AVISA).
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "grep=" >> "$GITHUB_OUTPUT"
            echo "label=full" >> "$GITHUB_OUTPUT"
          else
            echo "grep=--grep @smoke" >> "$GITHUB_OUTPUT"
            echo "label=smoke" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      # Regenera o client (ver nota no job typecheck) antes do migrate/seed/build,
      # que importam @prisma/client — cache stale de schema novo quebraria o seed.
      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ env.DB_URL }}

      - name: Migrate + seed (banco de teste E2E)
        run: |
          pnpm prisma migrate deploy
          pnpm tsx prisma/seed.ts
        env:
          DATABASE_URL: ${{ env.DB_URL }}

      - name: Install Playwright browser
        # sem --with-deps: system deps já instalados no runner self-hosted (root, one-time)
        run: pnpm exec playwright install chromium

      # ── App: build de producao local (sem buildar imagem Docker) ──
      - name: Build app (next build)
        run: pnpm build
        env:
          DATABASE_URL: ${{ env.DB_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}

      - name: Liberar porta 3000 (self-hosted runner reusa o host)
        run: fuser -k 4000/tcp || true

      - name: Subir app (next start)
        run: |
          pnpm start >/tmp/app.log 2>&1 &
          for _ in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4000/login || true)
            if [ "$code" = "200" ]; then echo "app UP"; exit 0; fi
            sleep 2
          done
          echo "::error::app nao subiu a tempo"; tail -50 /tmp/app.log; exit 1
        env:
          DATABASE_URL: ${{ env.DB_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          CRON_SECRET: ${{ env.CRON_SECRET }}
          WHATSAPP_MOCK: "1"
          AUTENTIQUE_MOCK: "1"
          PORT: "4000"

      - name: Rodar E2E (${{ steps.scope.outputs.label }})
        run: pnpm exec playwright test ${{ steps.scope.outputs.grep }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4000

      - name: Logs do app (se falhar)
        if: failure()
        run: tail -100 /tmp/app.log || true

      - name: Upload report (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.scope.outputs.label }}
          path: playwright-report/
          retention-days: 7

      - name: Cleanup porta 3000 (self-hosted runner)
        if: always()
        run: fuser -k 4000/tcp || true

  # ============================================================
  # Deploy: VPS so faz `docker pull` + restart + migrate
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 8
    # SERIALIZA deploys: dois pushes proximos NAO disputam a VPS ao mesmo tempo.
    # Group fixo (nao por ref/sha) => todo deploy entra na MESMA fila.
    # cancel-in-progress=false => o 2o deploy ESPERA o 1o terminar (nao cancela,
    # nao perde commit) — evita git reset --hard + migrate deploy concorrentes.
    # O build (job anterior) continua rodando em paralelo; so o deploy enfileira.
    concurrency:
      group: deploy-vps-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          envs: GHCR_USER,GHCR_TOKEN,GH_REPO
          script: |
            set -euo pipefail
            cd /home/deployer/arenatech-app

            REPO_LOWER=$(echo "${GH_REPO}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:latest"

            # 1) Em paralelo: git fetch + docker login + docker pull
            echo "=> Pulling git + login GHCR + pulling image (paralelo)..."
            git fetch origin main &
            GIT_PID=$!
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin >/dev/null
            docker pull -q "$IMAGE" &
            DOCKER_PID=$!
            wait $GIT_PID
            git reset --hard origin/main
            wait $DOCKER_PID
            echo "   git + image prontos"

            # 2) Instalar/atualizar server block do catalogo novo
            echo "=> Atualizando Nginx catalogo.arenatechpi.com.br..."
            sudo -n cp /home/deployer/arenatech-app/deploy/nginx/catalogo.arenatechpi.com.br.conf /etc/nginx/sites-available/catalogo.arenatechpi.com.br.conf
            sudo -n ln -sf /etc/nginx/sites-available/catalogo.arenatechpi.com.br.conf /etc/nginx/sites-enabled/catalogo.arenatechpi.com.br.conf
            sudo -n nginx -t
            sudo -n systemctl reload nginx

            cat > docker-compose.deploy.yml <<EOF
            services:
              app:
                image: ${IMAGE}
            EOF

            # 3) Migrations ANTES de subir o app novo.
            #
            #    Ordem critica: a imagem NOVA roda `migrate deploy` num container
            #    efemero (run --rm) — com o env/rede do compose (postgres healthy)
            #    e o prisma CLI ja no PATH (/opt/prisma). So depois subimos o app.
            #
            #    Por que: se subissemos o app ANTES da migration (ordem antiga),
            #    havia uma janela em que o app no ar usava o schema velho — toda
            #    query na tabela alterada estourava "column ... does not exist"
            #    ate a migration terminar (ex.: pix_approved_at em 2026-06-14).
            #
            #    Fail-fast: se a migration falhar, ABORTA o deploy (exit 1) e
            #    mantem o app ANTIGO no ar — nunca sobe app com schema
            #    dessincronizado. O `app` antigo segue servindo (codigo antigo
            #    e compativel com o schema antigo).
            echo "=> Running migrations (imagem nova, antes de subir o app)..."
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.yml \
              run --rm --no-deps app prisma migrate deploy || {
                echo "=> ERRO: migrate deploy falhou. Abortando deploy; app ANTIGO segue no ar."
                exit 1
              }

            # 4) Recriar so o container app (--no-deps nao mexe em postgres/redis/minio).
            #    Schema ja esta atualizado => app novo sobe consistente.
            echo "=> Recriando container app..."
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d --no-build --no-deps app

            # 5) Limpeza assincrona (nao bloqueia o deploy)
            (docker image prune -af --filter "until=24h" >/dev/null 2>&1 &) || true

            echo "=> Deploy completed at $(date)"
