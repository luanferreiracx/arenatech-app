name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (lint + types + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test

      - name: Validate Prisma schema
        run: pnpm prisma validate
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm vitest run --exclude="**/integration/**"
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000

  deploy:
    name: Deploy to VPS
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deployer/arenatech-app

            echo "=> Pulling latest..."
            git fetch origin main
            git reset --hard origin/main

            echo "=> Building Docker image..."
            docker compose -f docker-compose.prod.yml build app

            echo "=> Starting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "=> Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate resolve --rolled-back 20260515175132_realign_customers_to_spec 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy || {
              echo "=> WARNING: Migration deploy had issues. App is running."
              echo "=> Check: docker compose -f docker-compose.prod.yml exec app npx prisma migrate status"
            }

            echo "=> Deploy completed at $(date)"
