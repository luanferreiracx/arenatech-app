name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos no mesmo branch quando um novo push chega
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.0.8

jobs:
  # ============================================================
  # Setup compartilhado — instala deps + gera Prisma client.
  # Os 3 jobs (lint, typecheck, test) reaproveitam via cache.
  # ============================================================
  setup:
    name: Setup (deps + prisma)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pnpm-store: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache node_modules + prisma client
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  # ============================================================
  # Lint (paralelo) — com cache do ESLint
  # ============================================================
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-

      - name: Lint
        run: pnpm eslint src --cache --cache-location .eslintcache --cache-strategy content

  # ============================================================
  # Typecheck (paralelo)
  # ============================================================
  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # ============================================================
  # Unit tests (paralelo)
  # ============================================================
  test:
    name: Unit tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm vitest run --exclude="**/integration/**"
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000

  # ============================================================
  # Build Docker image + push para GHCR
  # Roda em paralelo com lint/typecheck/test (so depende de setup
  # implicitamente via cache hit). Para main, exige todos verdes.
  # ============================================================
  build-image:
    name: Build & push Docker image
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ============================================================
  # Deploy: VPS so faz `docker pull` + restart + migrate
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deployer/arenatech-app

            echo "=> Pulling latest commit (config + migrations)..."
            git fetch origin main
            git reset --hard origin/main

            # Imagem GHCR esta publica — pull direto, sem login.
            # Repo lowercase obrigatorio em registros OCI:
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:latest"
            echo "=> Pulling app image: $IMAGE"
            docker pull "$IMAGE"

            echo "=> (Re)criando container app com a nova imagem..."
            # docker-compose.prod.yml ainda referencia build local; usamos override:
            cat > docker-compose.deploy.yml <<EOF
            services:
              app:
                image: ${IMAGE}
            EOF
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d --no-build

            echo "=> Esperando healthcheck..."
            for i in $(seq 1 30); do
              if docker exec arenatech-app sh -c 'true' 2>/dev/null; then
                echo "container arenatech-app pronto"
                break
              fi
              sleep 1
            done

            echo "=> Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy || {
              echo "=> WARNING: Migration deploy teve issues. App esta no ar."
            }

            echo "=> Limpando imagens antigas (deixa as 3 ultimas)..."
            docker image prune -af --filter "until=24h" 2>/dev/null || true

            echo "=> Deploy completed at $(date)"
