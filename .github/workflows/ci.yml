name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos no mesmo branch quando um novo push chega
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.0.8

jobs:
  # ============================================================
  # Setup compartilhado — instala deps + gera Prisma client.
  # Os 3 jobs (lint, typecheck, test) reaproveitam via cache.
  # ============================================================
  setup:
    name: Setup (deps + prisma)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      pnpm-store: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache node_modules + prisma client
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  # ============================================================
  # Lint (paralelo) — com cache do ESLint
  # ============================================================
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package.json') }}-

      - name: Lint
        run: pnpm eslint src --cache --cache-location .eslintcache --cache-strategy content

  # ============================================================
  # Typecheck (paralelo)
  # ============================================================
  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  # ============================================================
  # Unit tests (paralelo)
  # ============================================================
  test:
    name: Unit tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm vitest run --exclude="**/integration/**"
        env:
          DATABASE_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
          NEXTAUTH_URL: http://localhost:3000

  # ============================================================
  # Build Docker image + push para GHCR
  # Roda em paralelo com lint/typecheck/test (so depende de setup
  # implicitamente via cache hit). Para main, exige todos verdes.
  # ============================================================
  build-image:
    name: Build & push Docker image
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ============================================================
  # E2E: roda contra a IMAGEM Docker recem-buildada (mesma de prod) —
  # sem Turbopack/dev => sem flakiness. Roda EM PARALELO ao deploy e NAO o
  # bloqueia (deploy nao tem `needs: e2e`). Se quebrar, este job fica vermelho
  # (voce e avisado) mas o deploy ja seguiu. Recupera cobertura de E2E sem
  # custo no caminho critico do deploy.
  # ============================================================
  e2e:
    name: E2E (nao bloqueia deploy)
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DB_URL: postgresql://arenatech:testpass@localhost:5432/arenatech_e2e
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: e2e-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      SUPERADMIN_CPF: "12345678909"
      SUPERADMIN_PASSWORD: "Ar3naTech2026Super"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arenatech
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: arenatech_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
            node_modules/@prisma/client
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema/**/*.prisma') }}

      - name: Install deps (fallback se cache miss)
        run: pnpm install --frozen-lockfile

      - name: Migrate + seed (banco de teste E2E)
        run: |
          pnpm prisma migrate deploy
          pnpm tsx prisma/seed.ts
        env:
          DATABASE_URL: ${{ env.DB_URL }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir app (imagem buildada, mesma de prod)
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):sha-${{ github.sha }}"
          echo "Usando imagem: $IMAGE"
          docker pull -q "$IMAGE"
          # --network host: o container alcanca postgres/redis em localhost:5432/6379
          docker run -d --name arenatech-e2e --network host \
            -e DATABASE_URL="${{ env.DB_URL }}" \
            -e REDIS_URL="${{ env.REDIS_URL }}" \
            -e NEXTAUTH_SECRET="${{ env.NEXTAUTH_SECRET }}" \
            -e NEXTAUTH_URL="${{ env.NEXTAUTH_URL }}" \
            -e NODE_ENV=production \
            -e PORT=3000 \
            "$IMAGE"

      - name: Aguardar app responder
        run: |
          for _ in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then echo "app UP"; exit 0; fi
            sleep 2
          done
          echo "::error::app nao subiu a tempo"; docker logs arenatech-e2e | tail -50; exit 1

      - name: Rodar E2E (Playwright)
        run: pnpm exec playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Logs do app (se falhar)
        if: failure()
        run: docker logs arenatech-e2e 2>&1 | tail -100

      - name: Upload report (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ============================================================
  # Deploy: VPS so faz `docker pull` + restart + migrate
  # ============================================================
  deploy:
    name: Deploy to VPS
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # SERIALIZA deploys: dois pushes proximos NAO disputam a VPS ao mesmo tempo.
    # Group fixo (nao por ref/sha) => todo deploy entra na MESMA fila.
    # cancel-in-progress=false => o 2o deploy ESPERA o 1o terminar (nao cancela,
    # nao perde commit) — evita git reset --hard + migrate deploy concorrentes.
    # O build (job anterior) continua rodando em paralelo; so o deploy enfileira.
    concurrency:
      group: deploy-vps-production
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          envs: GHCR_USER,GHCR_TOKEN,GH_REPO
          script: |
            set -euo pipefail
            cd /home/deployer/arenatech-app

            REPO_LOWER=$(echo "${GH_REPO}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO_LOWER}:latest"

            # 1) Em paralelo: git fetch + docker login + docker pull
            echo "=> Pulling git + login GHCR + pulling image (paralelo)..."
            git fetch origin main &
            GIT_PID=$!
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin >/dev/null
            docker pull -q "$IMAGE" &
            DOCKER_PID=$!
            wait $GIT_PID
            git reset --hard origin/main
            wait $DOCKER_PID
            echo "   git + image prontos"

            # 2) Recriar so o container app (--no-deps nao mexe em postgres/redis/minio)
            echo "=> Recriando container app..."
            cat > docker-compose.deploy.yml <<EOF
            services:
              app:
                image: ${IMAGE}
            EOF
            docker compose -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d --no-build --no-deps app

            # 3) Migrations (sem esperar healthcheck — exec funciona assim que container sobe)
            echo "=> Running migrations..."
            for i in $(seq 1 20); do
              if docker exec arenatech-app sh -c 'true' 2>/dev/null; then break; fi
              sleep 1
            done
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy || {
              echo "=> WARNING: Migration deploy teve issues. App esta no ar."
            }

            # 4) Limpeza assincrona (nao bloqueia o deploy)
            (docker image prune -af --filter "until=24h" >/dev/null 2>&1 &) || true

            echo "=> Deploy completed at $(date)"
