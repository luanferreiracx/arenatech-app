name: Cron Jobs

# CADENCIA REGULAR migrou 100% pra SYSTEMD no VPS (deploy/systemd/*.{service,timer}).
# Motivo duplo: (1) o GitHub Actions atrasa/pula schedules — inaceitavel pra jobs
# sensiveis a tempo e a DINHEIRO; (2) rodar de */5 em */5 no runner self-hosted UNICO
# disputava a vez com build/deploy. Agora o self-hosted e' 100% dedicado a deploy.
#
# Este workflow fica so como BREAK-GLASS MANUAL (workflow_dispatch) — dispara um
# cron pontual se o systemd estiver fora ou pra teste. Roda em github-hosted
# (ubuntu-latest) pra NAO depender do runner self-hosted (que pode estar ocupado
# com um deploy ou travado). O curl bate no APP_URL publico.
on:
  workflow_dispatch:
    inputs:
      job:
        description: "Qual job rodar (deixe vazio pra todos)"
        required: false
        type: choice
        options:
          - ""
          - mark-overdue
          - close-abandoned-cash-sessions
          - expire-rewards
          - expire-subscriptions
          - resolve-stale-conversations
          - process-pending-talison
          - release-stale-reservations
          - process-deposit-repayments
          - reconcile-depix-transactions
          - reconcile-eulen-extract

# `shell: bash` usa `-eo pipefail` — sem isto o default e `bash -e` (sem
# pipefail), e o `curl ... | tee` mascara a falha do curl (o pipeline retorna
# o exit do tee=0) -> job verde falso mesmo o curl falhando (ex.: APP_URL vazio
# -> "no host"). Com pipefail, a falha do curl propaga e o job fica vermelho.
defaults:
  run:
    shell: bash

jobs:
  mark-overdue:
    if: ${{ inputs.job == '' || inputs.job == 'mark-overdue' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron mark-overdue
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/mark-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json
          # Falha o job se status != 200 (curl -f ja faz isso)

  close-abandoned-cash-sessions:
    if: ${{ inputs.job == '' || inputs.job == 'close-abandoned-cash-sessions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron close-abandoned-cash-sessions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/close-abandoned-cash-sessions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  expire-rewards:
    if: ${{ inputs.job == '' || inputs.job == 'expire-rewards' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron expire-rewards
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/expire-rewards" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  expire-subscriptions:
    if: ${{ inputs.job == '' || inputs.job == 'expire-subscriptions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron expire-subscriptions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/expire-subscriptions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  resolve-stale-conversations:
    if: ${{ inputs.job == '' || inputs.job == 'resolve-stale-conversations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron resolve-stale-conversations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/resolve-stale-conversations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  process-pending-talison:
    if: ${{ inputs.job == '' || inputs.job == 'process-pending-talison' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron process-pending-talison
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/process-pending-talison" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  release-stale-reservations:
    if: ${{ inputs.job == '' || inputs.job == 'release-stale-reservations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron release-stale-reservations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/release-stale-reservations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  process-deposit-repayments:
    if: ${{ inputs.job == '' || inputs.job == 'process-deposit-repayments' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron process-deposit-repayments
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/process-deposit-repayments" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  reconcile-depix-transactions:
    # Cadencia regular por SYSTEMD no VPS (arenatech-reconcile-depix.timer, 10 min).
    # Aqui so como break-glass manual.
    if: ${{ inputs.job == 'reconcile-depix-transactions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron reconcile-depix-transactions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/reconcile-depix-transactions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 180 \
            | tee /tmp/response.json

  reconcile-eulen-extract:
    # Cadencia regular por SYSTEMD no VPS (arenatech-reconcile-eulen-extract.timer, 1h).
    # Aqui so como break-glass manual.
    if: ${{ inputs.job == 'reconcile-eulen-extract' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron reconcile-eulen-extract
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/reconcile-eulen-extract" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 180 \
            | tee /tmp/response.json
