name: Cron Jobs

on:
  schedule:
    # Sao Paulo BRT = UTC-3. Horarios em UTC.
    # 03:00 BRT (06:00 UTC): mark-overdue + close-abandoned-cash-sessions + expire-rewards
    - cron: "0 6 * * *"
    # De hora em hora: resolve-stale-conversations (precisa de granularidade
    # pra o corte de 12h ser preciso, nao so 1x/dia).
    - cron: "0 * * * *"
    # A cada 10 min: process-pending-talison (rede de captura de disparos
    # perdidos no deploy). O fluxo de espera/alerta/off-hours (talison-waiting-sweep)
    # NÃO roda aqui — precisa de granularidade de 1 min, então roda por systemd
    # timer no VPS (ver deploy/talison-waiting-sweep.{service,timer}).
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Qual job rodar (deixe vazio pra todos)"
        required: false
        type: choice
        options:
          - ""
          - mark-overdue
          - close-abandoned-cash-sessions
          - expire-rewards
          - resolve-stale-conversations
          - process-pending-talison
          - release-stale-reservations

jobs:
  mark-overdue:
    # Roda no schedule 03:00 BRT (06:00 UTC) ou manualmente.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'mark-overdue' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron mark-overdue
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/mark-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json
          # Falha o job se status != 200 (curl -f ja faz isso)

  close-abandoned-cash-sessions:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'close-abandoned-cash-sessions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron close-abandoned-cash-sessions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/close-abandoned-cash-sessions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  expire-rewards:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'expire-rewards' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron expire-rewards
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/expire-rewards" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  resolve-stale-conversations:
    # Roda de hora em hora (schedule horario) ou manualmente. Resolve conversas
    # do Talison paradas ha 12h+ (paridade Laravel).
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || inputs.job == 'resolve-stale-conversations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron resolve-stale-conversations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/resolve-stale-conversations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  process-pending-talison:
    # Roda a cada 10 min (schedule */10) ou manualmente. Rede de captura: reprocessa
    # conversas com mensagem do cliente pendente cujo disparo em memoria se perdeu.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *') || inputs.job == 'process-pending-talison' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron process-pending-talison
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/process-pending-talison" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  release-stale-reservations:
    # Roda a cada 10 min (schedule */10) ou manualmente. Libera reservas de
    # StockItem presas (carrinho PDV abandonado sem finalizar/abandonar).
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *') || inputs.job == 'release-stale-reservations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron release-stale-reservations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/release-stale-reservations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json
