name: Cron Jobs

on:
  schedule:
    # Sao Paulo BRT = UTC-3. Horarios em UTC.
    # 03:00 BRT (06:00 UTC): mark-overdue + close-abandoned-cash-sessions + expire-rewards
    - cron: "0 6 * * *"
    # De hora em hora: resolve-stale-conversations (precisa de granularidade
    # pra o corte de 12h ser preciso, nao so 1x/dia).
    # (reconcile-eulen-extract NAO roda mais aqui — migrou pra systemd no VPS.)
    - cron: "0 * * * *"
    # A cada 10 min: process-pending-talison + release-stale-reservations (rede de
    # captura). talison-waiting-sweep e reconcile-depix-transactions NAO rodam aqui —
    # precisam de confiabilidade/granularidade e rodam por systemd no VPS
    # (ver deploy/systemd/*.{service,timer}).
    - cron: "*/10 * * * *"
    # A cada 5 min: process-deposit-repayments (ADR 0052). Reprocessa repasses
    # PENDING da carteira de taxas (depósito non-custodial cujo repasse falhou).
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Qual job rodar (deixe vazio pra todos)"
        required: false
        type: choice
        options:
          - ""
          - mark-overdue
          - close-abandoned-cash-sessions
          - expire-rewards
          - resolve-stale-conversations
          - process-pending-talison
          - release-stale-reservations
          - process-deposit-repayments
          - reconcile-depix-transactions
          - reconcile-eulen-extract

# `shell: bash` usa `-eo pipefail` — sem isto o default e `bash -e` (sem
# pipefail), e o `curl ... | tee` mascara a falha do curl (o pipeline retorna
# o exit do tee=0) -> job verde falso mesmo o curl falhando (ex.: APP_URL vazio
# -> "no host"). Com pipefail, a falha do curl propaga e o job fica vermelho.
defaults:
  run:
    shell: bash

jobs:
  mark-overdue:
    # Roda no schedule 03:00 BRT (06:00 UTC) ou manualmente.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'mark-overdue' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron mark-overdue
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/mark-overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json
          # Falha o job se status != 200 (curl -f ja faz isso)

  close-abandoned-cash-sessions:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'close-abandoned-cash-sessions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron close-abandoned-cash-sessions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/close-abandoned-cash-sessions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  expire-rewards:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *') || inputs.job == '' || inputs.job == 'expire-rewards' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron expire-rewards
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/expire-rewards" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  resolve-stale-conversations:
    # Roda de hora em hora (schedule horario) ou manualmente. Resolve conversas
    # do Talison paradas ha 12h+ (paridade Laravel).
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') || inputs.job == 'resolve-stale-conversations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron resolve-stale-conversations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/resolve-stale-conversations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            | tee /tmp/response.json

  process-pending-talison:
    # Roda a cada 10 min (schedule */10) ou manualmente. Rede de captura: reprocessa
    # conversas com mensagem do cliente pendente cujo disparo em memoria se perdeu.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *') || inputs.job == 'process-pending-talison' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron process-pending-talison
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/process-pending-talison" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  release-stale-reservations:
    # Roda a cada 10 min (schedule */10) ou manualmente. Libera reservas de
    # StockItem presas (carrinho PDV abandonado sem finalizar/abandonar).
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *') || inputs.job == 'release-stale-reservations' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron release-stale-reservations
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/release-stale-reservations" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  process-deposit-repayments:
    # Roda a cada 5 min (schedule */5) ou manualmente. Reprocessa repasses
    # PENDING da carteira de taxas (ADR 0052): depósito non-custodial cujo
    # repasse do líquido ao tenant falhou (LWK fora, fee L-BTC). Idempotente.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *') || inputs.job == 'process-deposit-repayments' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron process-deposit-repayments
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/process-deposit-repayments" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            | tee /tmp/response.json

  reconcile-depix-transactions:
    # CADENCIA REGULAR agora roda por SYSTEMD no VPS (a cada 10 min) — GitHub Actions
    # atrasa/pula schedules e isso e' dependencia de DINHEIRO (deposito static-QR
    # ficou preso em PROCESSING por o reconcile agendado nao rodar). Ver
    # deploy/systemd/arenatech-reconcile-depix.{service,timer}. AQUI fica so como
    # break-glass MANUAL (workflow_dispatch), nunca no schedule.
    if: ${{ inputs.job == 'reconcile-depix-transactions' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron reconcile-depix-transactions
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/reconcile-depix-transactions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 180 \
            | tee /tmp/response.json

  reconcile-eulen-extract:
    # CADENCIA REGULAR agora roda por SYSTEMD no VPS (de hora em hora) — ver
    # deploy/systemd/arenatech-reconcile-eulen-extract.{service,timer}. AQUI fica so
    # como break-glass MANUAL (workflow_dispatch), nunca no schedule.
    if: ${{ inputs.job == 'reconcile-eulen-extract' }}
    runs-on: ubuntu-latest
    steps:
      - name: Invoca cron reconcile-eulen-extract
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/cron/reconcile-eulen-extract" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 180 \
            | tee /tmp/response.json
