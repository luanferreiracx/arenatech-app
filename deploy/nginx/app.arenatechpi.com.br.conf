server {
    listen 80;
    server_name app.arenatechpi.com.br;
    return 301 https://pdvdepix.app$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.arenatechpi.com.br;

    # SSL — Cloudflare Origin Certificate (wildcard *.arenatechpi.com.br)
    ssl_certificate /etc/nginx/ssl/cloudflare-origin-wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-wildcard.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Logs
    access_log /var/log/nginx/arenatech-app-redirect-access.log;
    error_log /var/log/nginx/arenatech-app-redirect-error.log;

    # HSTS: avisa browsers que nunca devem acessar este host via HTTP.
    # max-age=31536000 = 1 ano. Sem includeSubDomains (*.arenatechpi tem outros vhosts).
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Redireciona todo o tráfego para o domínio principal da intranet.
    # pdvdepix.app é o único domínio autorizado para acesso à intranet.
    return 301 https://pdvdepix.app$request_uri;
}
