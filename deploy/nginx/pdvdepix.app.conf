# pdvdepix.app — domínio principal da intranet Arena Tech + landing pública.
# Cert: Let's Encrypt via certbot (pdvdepix.app, sem www — não há registro DNS para www).
# SSL gerenciado pelo Certbot — não editar os blocos "# managed by Certbot".
server {
    server_name pdvdepix.app;

    client_max_body_size 50M;
    access_log /var/log/nginx/pdvdepix-access.log;
    error_log /var/log/nginx/pdvdepix-error.log;

    # HSTS apenas no Nginx — os demais headers de segurança (X-Frame-Options,
    # X-Content-Type-Options, Referrer-Policy, Permissions-Policy, CSP) já são
    # enviados pelo Next.js via next.config.ts e não devem ser duplicados aqui.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Cloudflare real IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pdvdepix.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pdvdepix.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = pdvdepix.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name pdvdepix.app;
    return 404; # managed by Certbot
}
